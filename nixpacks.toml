[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@9 --force && ln -s $(which pnpm 2>/dev/null || echo /usr/local/bin/pnpm) /usr/local/bin/pnpm 2>/dev/null; npx pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "npx pnpm --filter @workspace/db run build 2>/dev/null || true",
  "npx pnpm --filter @workspace/api-zod run build 2>/dev/null || true",
  "npx pnpm --filter @workspace/integrations-anthropic-ai run build 2>/dev/null || true",
  "npx pnpm --filter @workspace/integrations-openai-ai-server run build 2>/dev/null || true",
  "npx pnpm --filter @workspace/api-client-react run build 2>/dev/null || true",
  "PORT=3000 BASE_PATH=/ npx pnpm --filter @workspace/crypto-trader run build",
  "mkdir -p artifacts/api-server/public && cp -r artifacts/crypto-trader/dist/public/* artifacts/api-server/public/",
  "npx pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "npx pnpm --filter @workspace/api-server run start"
